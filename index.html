<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Journey Flow</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Sarabun',sans-serif;
  background:#060a12;
  color:#e0e6f0;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── HEADER ── */
.hdr{
  text-align:center;
  padding:32px 20px 20px;
}
.hdr h1{
  font-size:1.7rem;font-weight:800;
  background:linear-gradient(135deg,#60a5fa,#a78bfa,#34d399);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:6px;
}
.hdr p{font-size:.88rem;color:#3a5070}

/* ── PHASE LEGEND ── */
.legend{
  display:flex;justify-content:center;gap:24px;
  padding:0 20px 20px;flex-wrap:wrap;
}
.leg{display:flex;align-items:center;gap:7px;font-size:.78rem;font-weight:600}
.leg-dot{width:10px;height:10px;border-radius:50%}

/* ── SCROLL WRAPPER ── */
.scroll-outer{
  width:100%;
  overflow-x:auto;
  padding:0 24px 8px;
  scrollbar-width:thin;
  scrollbar-color:#1a2540 #060a12;
}
.scroll-outer::-webkit-scrollbar{height:4px}
.scroll-outer::-webkit-scrollbar-track{background:#060a12}
.scroll-outer::-webkit-scrollbar-thumb{background:#1a2540;border-radius:4px}

/* ── FLOW TRACK ── */
.flow-wrap{
  position:relative;
  min-width:max-content;
  padding:30px 32px 20px;
}

/* the line */
.flow-line{
  position:absolute;
  top:74px; /* center of nodes */
  left:32px; right:32px;
  height:3px;
  background:#0f1825;
  border-radius:3px;
  z-index:0;
}
.flow-line-fill{
  position:absolute;
  top:0;left:0;height:100%;
  border-radius:3px;
  transition:width .7s cubic-bezier(.4,0,.2,1);
  width:0%;
}

/* phase band under the line */
.phase-bands{
  position:absolute;
  top:72px;left:32px;right:32px;
  height:7px;
  border-radius:4px;
  display:flex;
  overflow:hidden;
  opacity:.18;
  z-index:0;
}
.band-pre {background:#3b82f6;flex:14}
.band-dur {background:#f59e0b;flex:15}
.band-post{background:#10b981;flex:12}

/* patient icon */
.patient{
  position:absolute;
  top:38px;
  font-size:1.6rem;
  transition:left .7s cubic-bezier(.4,0,.2,1);
  filter:drop-shadow(0 0 12px rgba(96,165,250,.8));
  z-index:10;
  pointer-events:none;
  transform:translateX(-50%);
}

/* ── NODES ROW ── */
.nodes-row{
  display:flex;
  align-items:flex-start;
  gap:0;
  position:relative;
  z-index:2;
}

.node-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  flex-shrink:0;
  width:88px;
  cursor:pointer;
}

/* connector between nodes */
.node-conn{
  flex:1;min-width:14px;
  height:3px;
  background:transparent;
  margin-top:35px;
  align-self:flex-start;
  position:relative;z-index:1;
}

.node-circle{
  width:44px;height:44px;
  border-radius:50%;
  background:#0c1422;
  border:2.5px solid #1a2540;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;
  transition:all .45s cubic-bezier(.4,0,.2,1);
  position:relative;
  margin-bottom:10px;
}
.node-circle.done{
  background:var(--bg);
  border-color:var(--c);
  color:var(--c);
}
.node-circle.active{
  background:var(--bg);
  border-color:var(--c);
  box-shadow:0 0 0 5px var(--glow), 0 0 22px var(--glow);
  transform:scale(1.15);
}

/* pulse on active */
@keyframes pulse{
  0%  {box-shadow:0 0 0 0 var(--glow), 0 0 22px var(--glow)}
  70% {box-shadow:0 0 0 10px transparent, 0 0 22px var(--glow)}
  100%{box-shadow:0 0 0 0 transparent, 0 0 22px var(--glow)}
}
.node-circle.active{animation:pulse 2s infinite}

.node-name{
  font-size:.68rem;font-weight:700;
  color:#2d3f5a;text-align:center;
  line-height:1.35;
  transition:color .4s;
  letter-spacing:.02em;
  width:80px;
}
.node-wrap.active .node-name{color:var(--c)}
.node-wrap.done  .node-name{color:var(--c);opacity:.65}

/* phase label above cluster */
.phase-label-row{
  display:flex;
  margin-bottom:4px;
  min-width:max-content;
}
.phase-cluster-label{
  font-size:.65rem;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;padding:3px 12px;
  border-radius:20px;border:1px solid;
  flex-shrink:0;
}

/* ── DETAIL CARD ── */
.detail-section{
  width:100%;max-width:820px;
  margin:28px auto 0;
  padding:0 20px;
  min-height:260px;
}
.detail-card{
  background:#0c1422;
  border-radius:20px;
  border:1.5px solid #141e30;
  padding:28px 30px 22px;
  position:relative;
  overflow:hidden;
  transition:border-color .5s,box-shadow .5s;
  animation:fadeUp .4s ease;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px)}
  to  {opacity:1;transform:translateY(0)}
}
.detail-stripe{
  position:absolute;top:0;left:0;right:0;height:3px;
  transition:background .5s;
}

.dc-top{margin-bottom:18px}
.dc-phase-tag{
  display:inline-block;font-size:.68rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  padding:3px 12px;border-radius:20px;
  margin-bottom:10px;
}
.dc-step-num{font-size:.75rem;color:#3a5070;margin-bottom:4px;letter-spacing:.08em}
.dc-title{font-size:1.4rem;font-weight:800;margin-bottom:4px}
.dc-sub{font-size:.9rem;color:#4b6a9b;margin-bottom:16px}

.dc-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
@media(max-width:560px){.dc-grid{grid-template-columns:1fr}}

.dc-box{
  background:#07101c;
  border-radius:14px;padding:14px 16px;
  border:1px solid #141e30;
  animation:fadeUp .4s ease both;
}
.dc-box-head{font-size:.78rem;font-weight:700;margin-bottom:5px}
.dc-box-body{font-size:.78rem;color:#4b6a9b;line-height:1.6}

.dc-ai{
  display:flex;align-items:flex-start;gap:9px;
  background:#05090f;border-radius:12px;
  padding:12px 14px;border:1px solid #1a2540;
  animation:fadeUp .4s ease .28s both;
}
.ai-pill{
  flex-shrink:0;font-size:.67rem;font-weight:700;
  padding:3px 9px;border-radius:8px;letter-spacing:.06em;
  background:rgba(167,139,250,.13);color:#a78bfa;
  border:1px solid rgba(167,139,250,.25);white-space:nowrap;
}
.ai-list{font-size:.78rem;color:#4b6a9b;line-height:1.6}

/* idle */
.idle-card{
  background:#0c1422;border-radius:20px;
  border:1.5px solid #141e30;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:220px;gap:12px;
  color:#2d3f5a;
}
.idle-icon{font-size:3rem;opacity:.25}

/* ── CONTROLS ── */
.controls{
  display:flex;align-items:center;gap:14px;
  justify-content:center;
  padding:24px 20px 40px;
  flex-wrap:wrap;
}
.btn-next{
  padding:13px 44px;border-radius:50px;border:none;
  font-family:'Sarabun',sans-serif;font-size:1rem;font-weight:700;
  cursor:pointer;letter-spacing:.04em;color:#fff;
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  box-shadow:0 4px 24px rgba(99,102,241,.35);
  transition:transform .2s,box-shadow .2s;
}
.btn-next:hover{transform:scale(1.04)}
.btn-next:active{transform:scale(.97)}
.btn-next.green{background:linear-gradient(135deg,#10b981,#34d399);box-shadow:0 4px 24px rgba(16,185,129,.35)}
.btn-reset{
  padding:10px 20px;border-radius:50px;
  border:1px solid #1a2540;background:transparent;
  color:#3a5070;font-family:'Sarabun',sans-serif;
  font-size:.85rem;cursor:pointer;transition:all .2s;
}
.btn-reset:hover{background:#111d2e;color:#8899bb}
.btn-prev{
  padding:13px 28px;border-radius:50px;border:none;
  font-family:'Sarabun',sans-serif;font-size:1rem;font-weight:700;
  cursor:pointer;letter-spacing:.04em;color:#93c5fd;
  background:#0f1e35;
  border:1.5px solid #1e3a5f;
  transition:all .2s;
}
.btn-prev:hover{background:#1a2e48;border-color:#3b82f6}
.btn-prev:active{transform:scale(.97)}
.step-ctr{font-size:.82rem;color:#2d3f5a;letter-spacing:.06em;min-width:52px;text-align:center}
.credit{
  text-align:center;
  font-size:.78rem;color:#2d3f5a;
  padding:8px 20px 32px;
  letter-spacing:.04em;
}
.credit strong{color:#4b6a9b;font-weight:600}

/* ── MOBILE ── */
@media(max-width:600px){
  .hdr{padding:22px 16px 14px}
  .hdr h1{font-size:1.3rem}
  .hdr p{font-size:.8rem}

  .legend{gap:14px;padding:0 16px 16px}
  .leg{font-size:.72rem}

  .scroll-outer{padding:0 12px 8px}
  .flow-wrap{padding:24px 16px 16px}
  .flow-line{left:16px;right:16px}
  .phase-bands{left:16px;right:16px}
  .flow-line{top:60px}
  .phase-bands{top:58px}
  .patient{top:28px;font-size:1.3rem}

  .node-wrap{width:60px}
  .node-circle{width:34px;height:34px;font-size:.85rem;margin-bottom:7px}
  .node-conn{margin-top:28px;min-width:8px}
  .node-name{font-size:.58rem;width:58px}

  .detail-section{padding:0 12px;margin-top:20px}
  .detail-card{padding:20px 16px 16px;border-radius:16px}
  .dc-title{font-size:1.15rem}
  .dc-sub{font-size:.82rem}
  .dc-phase-tag{font-size:.62rem}
  .dc-box{padding:12px 13px}
  .dc-box-head{font-size:.75rem}
  .dc-box-body{font-size:.74rem}
  .ai-list{font-size:.74rem}

  .controls{gap:8px;padding:18px 12px 28px;flex-wrap:wrap}
  .btn-next{padding:12px 28px;font-size:.92rem;flex:1;min-width:120px}
  .btn-prev{padding:12px 18px;font-size:.92rem}
  .btn-reset{padding:9px 14px;font-size:.8rem}
  .step-ctr{font-size:.76rem;min-width:40px}

  .idle-card{min-height:160px;font-size:.88rem;border-radius:16px}
  .idle-icon{font-size:2.2rem}

  .dc-grid{grid-template-columns:1fr}
}
</style>
</head>

    stripe:'linear-gradient(90deg,#059669,#34d399)',
    tag:'Post-Hospital · ขั้น 19',
    title:'Clinical & Growth Command Center',
    sub:'ทีม Clinical ดู Dashboard ผู้ป่วยทั้งหมด Real-time — วัด Outcome รวม',
    boxes:[
      {head:'💡 ความต้องการผู้ป่วย',body:'(มุมของ รพ.) ต้องการเห็น Population-level outcomes และ identify ผู้ป่วยกลุ่มเสี่ยงก่อนที่จะแย่ลง'},
      {head:'🏥 สิ่งที่ รพ. ต้องทำ',body:'Dashboard รวม KPIs ทั้งหมด — Readmission rate, Adherence, PROMs, Safety events, Financial performance AI จัด Priority list ผู้ป่วยที่ต้องการ intervention'},
      {head:'📊 KPI',body:'Readmission rate (30/60/90d) · Medication adherence rate · Patient satisfaction (NPS) · Clinical outcome indicators · Cost per episode'},
      {head:'⚠️ Pain Point',body:'ข้อมูลกระจัดกระจาย ไม่มี Single view ของผู้ป่วยแต่ละราย ทีมไม่รู้ว่าใครต้องการความช่วยเหลือ'},
    ],
    ai:'Clinical Command Center Dashboard · Predictive Analytics · Population Health AI · Value-based Care Tracker'
  },
];

// ── STATE ──────────────────────────────────────────────────────────
let cur = -1;
const NODE_W = 88;

// ── BUILD NODES ────────────────────────────────────────────────────
function buildNodes(){
  const row = document.getElementById('nodesRow');
  row.innerHTML = '';
  STEPS.forEach((s,i)=>{
    // connector before (not before first)
    if(i>0){
      const conn = document.createElement('div');
      conn.className='node-conn';
      conn.id='conn'+i;
      row.appendChild(conn);
    }
    const wrap = document.createElement('div');
    wrap.className='node-wrap';
    wrap.id='nw'+i;
    wrap.style.cssText=`--c:${s.color};--bg:${s.bg};--glow:${s.glow}`;
    wrap.innerHTML=`
      <div class="node-circle" id="nc${i}">${s.icon}</div>
      <div class="node-name" id="nn${i}">${s.label}</div>
    `;
    wrap.onclick=()=>jumpTo(i);
    row.appendChild(wrap);
  });
}

function nodeLeft(i){
  // left edge of flow-wrap = 32px padding
  // each node is NODE_W wide, connectors are flex
  // easier: just calculate from DOM
  const nc = document.getElementById('nc'+i);
  if(!nc) return 0;
  const wrap = document.getElementById('flowWrap');
  const wRect = wrap.getBoundingClientRect();
  const nRect = nc.getBoundingClientRect();
  return (nRect.left + nRect.width/2) - wRect.left;
}

function updateTrack(){
  if(cur<0){
    document.getElementById('lineFill').style.width='0%';
    document.getElementById('patient').style.left='24px';
    return;
  }
  const wrap = document.getElementById('flowWrap');
  const totalW = wrap.scrollWidth - 64;
  const left = nodeLeft(cur);
  const pct = (left / wrap.scrollWidth)*100;
  document.getElementById('lineFill').style.cssText=
    `width:${pct}%;background:${STEPS[cur].stripe}`;
  document.getElementById('patient').style.left=left+'px';

  // scroll to keep patient visible
  const outer = document.getElementById('scrollOuter');
  outer.scrollTo({left: left - outer.clientWidth/2, behavior:'smooth'});
}

function render(){
  STEPS.forEach((s,i)=>{
    const nw = document.getElementById('nw'+i);
    const nc = document.getElementById('nc'+i);
    nc.classList.remove('active','done');
    nw.classList.remove('active','done');
    if(i===cur){ nc.classList.add('active'); nw.classList.add('active'); }
    else if(i<cur){ nc.classList.add('done'); nw.classList.add('done'); nc.textContent='✓'; }
    else { nc.textContent=s.icon; }

    // connectors
    if(i>0){
      const conn = document.getElementById('conn'+i);
      if(conn) conn.style.background = i<=cur ? STEPS[i-1].color+'88' : 'transparent';
    }
  });

  updateTrack();

  // detail card
  const idle = document.getElementById('idleCard');
  const dcard = document.getElementById('detailCard');
  if(cur<0){
    idle.style.display='flex';
    dcard.style.display='none';
  } else {
    idle.style.display='none';
    dcard.style.display='block';
    const s = STEPS[cur];
    dcard.innerHTML=`
      <div class="detail-card ${cur>=6&&cur<=12?'':''}">
        <div class="detail-stripe" style="background:${s.stripe}"></div>
        <div class="dc-top">
          <div class="dc-phase-tag" style="background:${s.glow};color:${s.color};border:1px solid ${s.color}44">${s.tag}</div>
          <div class="dc-title" style="color:${s.color}">${s.title}</div>
          <div class="dc-sub">${s.sub}</div>
        </div>
        <div class="dc-grid">
          ${s.boxes.map((b,bi)=>`
            <div class="dc-box" style="animation-delay:${bi*100}ms">
              <div class="dc-box-head" style="color:${s.color}">${b.head}</div>
              <div class="dc-box-body">${b.body}</div>
            </div>
          `).join('')}
        </div>
        <div class="dc-ai">
          <span class="ai-pill">🤖 AI</span>
          <span class="ai-list">${s.ai}</span>
        </div>
      </div>
    `;
  }

  // buttons
  const btn  = document.getElementById('btnNext');
  const ctr  = document.getElementById('stepCtr');
  const rst  = document.getElementById('btnReset');
  const prv  = document.getElementById('btnPrev');
  if(cur<0){
    btn.textContent='ถัดไป →'; btn.className='btn-next';
    ctr.textContent=''; rst.style.display='none'; prv.style.display='none';
  } else if(cur<STEPS.length-1){
    const nxt = STEPS[cur+1];
    btn.textContent=nxt.label+' →'; btn.className='btn-next';
    ctr.textContent=(cur+1)+' / '+STEPS.length;
    rst.style.display='inline-block';
    prv.style.display='inline-block';
    prv.textContent='← '+(cur>0 ? STEPS[cur-1].label : 'เริ่มใหม่');
  } else {
    btn.textContent='✅ ครบทุกขั้นตอน'; btn.className='btn-next green';
    ctr.textContent=STEPS.length+' / '+STEPS.length;
    rst.style.display='inline-block';
    prv.style.display='inline-block';
    prv.textContent='← '+STEPS[cur-1].label;
  }
}

function scrollTop(){
  window.scrollTo({top:0,behavior:'smooth'});
}
function next(){
  if(cur<STEPS.length-1){ cur++; render(); scrollTop(); }
}
function prev(){
  if(cur>0){ cur--; render(); scrollTop(); }
  else { reset(); scrollTop(); }
}
function jumpTo(i){
  if(i<=cur+1){ cur=i; render(); scrollTop(); }
}
function reset(){
  cur=-1;
  buildNodes();
  render();
  scrollTop();
}

buildNodes();
render();
// re-render after fonts load to get correct positions
window.addEventListener('load',()=>render());
</script>
</body>
</html>
